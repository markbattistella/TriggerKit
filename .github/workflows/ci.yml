name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: macOS
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  simulator:
    name: ${{ matrix.name }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS Simulator
            sdk: iphonesimulator
            triple: arm64-apple-ios17.0-simulator
          - name: tvOS Simulator
            sdk: appletvsimulator
            triple: arm64-apple-tvos17.0-simulator
          - name: watchOS Simulator
            sdk: watchsimulator
            triple: arm64-apple-watchos10.0-simulator
          - name: visionOS Simulator
            sdk: xrsimulator
            triple: arm64-apple-xros1.0-simulator

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          SDKROOT=$(xcrun --sdk "${{ matrix.sdk }}" --show-sdk-path)
          swift build \
            --sdk "$SDKROOT" \
            --triple "${{ matrix.triple }}"

  catalyst:
    name: Mac Catalyst
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: xcodebuild -scheme TriggerKit -destination 'generic/platform=macOS,variant=Mac Catalyst' build
